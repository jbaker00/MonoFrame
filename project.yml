name: MonoFrame
options:
  bundleIdPrefix: com.jamesbaker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "G3P9A8Z2NP"
    CODE_SIGN_STYLE: Automatic

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0

targets:
  MonoFrame:
    type: application
    platform: iOS
    sources:
      - path: Sources/MonoFrame
        excludes:
          - Resources/Info.plist
          - Resources/MonoFrame.entitlements
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.MonoFrame
        INFOPLIST_FILE: Sources/MonoFrame/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MonoFrame/Resources/MonoFrame.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MonoFrameUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/MonoFrameUITests
    dependencies:
      - target: MonoFrame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.MonoFrameUITests
        TARGETED_DEVICE_FAMILY: "1,2"
