name: MonoFrame
options:
  bundleIdPrefix: com.jamesbaker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.2"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: "G3P9A8Z2NP"
    CODE_SIGN_STYLE: Automatic

targets:
  MonoFrame:
    type: application
    platform: iOS
    sources:
      - path: Sources/MonoFrame
        excludes:
          - Resources/Info.plist
          - Resources/MonoFrame.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.MonoFrame
        INFOPLIST_FILE: Sources/MonoFrame/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MonoFrame/Resources/MonoFrame.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MonoFrameTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/MonoFrameTests
    dependencies:
      - target: MonoFrame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.MonoFrameTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MonoFrame.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MonoFrame"
        BUNDLE_LOADER: "$(TEST_HOST)"

  MonoFrameUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/MonoFrameUITests
    dependencies:
      - target: MonoFrame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.MonoFrameUITests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
